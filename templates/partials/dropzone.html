{{define "dropzone"}}
<div class="dropzone" id="dropzone" role="region" aria-label="File upload area" data-upload-url="/files/upload">
  <div class="dropzone-content">
    <p class="dropzone-text">Drag files or folders here, or paste from clipboard</p>
    <label class="dropzone-fallback">
      <input type="file" id="file-input" multiple class="dropzone-input" aria-label="Choose files to upload">
      <span class="btn btn-secondary">Choose Files</span>
    </label>
  </div>
  <div class="upload-progress" id="upload-progress" hidden>
    <div class="upload-progress-fill" id="upload-progress-fill"></div>
  </div>
</div>
{{end}}
